apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: enterprise-prod

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
      - name: api-gateway
        image: mandalakodanda/api-gateway:7

        ports:
        - containerPort: 8080

        env:
        - name: USER_SERVICE_URL
          value: "http://user-service:8080"

        - name: ORDER_SERVICE_URL
          value: "http://order-service:8080"

        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8080"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: enterprise-prod

spec:
  selector:
    app: api-gateway

  ports:
  - port: 8080
    targetPort: 8080
