apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: enterprise-ingress
  namespace: enterprise-prod

spec:
  ingressClassName: nginx

  rules:

  - host: app.company.com

    http:
      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix

        backend:
          service:
            name: api-gateway
            port:
              number: 8080
